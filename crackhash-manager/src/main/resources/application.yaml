server:
  port: 8085

spring:
  application:
    name: crackhash-manager

  cloud:
    openfeign:
      client:
        config:
          workerFeignClient:
            url: ${WORKER_URL:http://localhost:8086}
            read-timeout: 500
            connect-timeout: 500

  mongodb:
    host: ${MONGO_DB_HOST:localhost}
    port: 27017
    database: crackhash_db_mongo
    username: mongo_user
    password: mongo_password

send-type: kafka

worker:
  number: 2

crack-hash:
  task:
    lifetime-duration-threshold: PT1M

  kafka:
    producer:
      config:
        bootstrap-servers: localhost:9092
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.apache.kafka.common.serialization.StringSerializer
        retries: 0
        acks: all
      topic: crackhash_task_request_topic
    consumer:
      config:
        bootstrap-servers: localhost:9092
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        group-id: crackhash_task_result_group_id
      topic: crackhash_task_result_topic