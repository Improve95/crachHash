  crackhash-manager-service:
    build:
      dockerfile: Dockerfile
    container_name: "manager-service"
    environment:
      KAFKA_URL: crackhash_kafka:9092
      WORKER_URL_1: http://crackhash-worker-service-1:8086
      WORKER_URL_2: http://crackhash-worker-service-2:8086
      WORKER_URL_3: http://crackhash-worker-service-3:8086
      MONGO_DB_HOST: mongo-1
      MONGO_DB_PORT: 27017
      SEND_TYPE: rest
      WORKER_NUMBER: 3
    ports:
      - "8085:8085"
    networks:
      - crackhash-net

networks:
  crackhash-net:
    name: "crackhash-net"
    driver: bridge
    external: true