services:
  crackhash_db_mongo:
    image: mongo:8.0
    container_name: "crackhash-mongo"
    ports:
      - '27017:27017'
    restart: unless-stopped
    logging:
      options:
        max-size: 300mb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo_user
      - MONGO_INITDB_ROOT_PASSWORD=mongo_password
    networks:
      - crackhash-net

  crackhash_zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: "crackhash-zookeeper"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
    networks:
      - crackhash-net

  crackhash_kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: "crackhash-kafka"
    depends_on:
      - crackhash_zookeeper
    restart: unless-stopped
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: crackhash_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://crackhash_kafka:29092,EXTERNAL://crackhash_kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - crackhash-net

  crackhash-manager-service:
    build:
      dockerfile: Dockerfile
    container_name: "manager-service"
    environment:
      KAFKA_URL: crackhash_kafka:9092
      WORKER_URL_1: http://crackhash-worker-service-1:8086
      WORKER_URL_2: http://crackhash-worker-service-2:8087
      WORKER_URL_3: http://crackhash-worker-service-3:8088
      MONGO_DB_HOST: crackhash_db_mongo
      SEND_TYPE: rest
      WORKER_NUMBER: 3
    ports:
      - "8085:8085"
    networks:
      - crackhash-net

networks:
  crackhash-net:
    name: "crackhash-net"
    driver: bridge
    external: true