services:
  crackhash_zookeeper:
    image: confluentinc/cp-zookeeper:7.9.0
    container_name: "crackhash-zookeeper"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
    networks:
      - crackhash-net

  crackhash_kafka:
    image: confluentinc/cp-kafka:7.9.0
    container_name: "crackhash-kafka"
    depends_on:
      - crackhash_zookeeper
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: crackhash_zookeeper:2181
      KAFKA_LISTENERS: 'PLAINTEXT://crackhash_kafka:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://crackhash_kafka:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - crackhash-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-cluster-ui
    ports:
      - "9095:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: crackhash_kafka:9092
    depends_on:
      - crackhash_kafka
    networks:
      - crackhash-net

  crackhash-manager-service:
    build:
      dockerfile: Dockerfile
    container_name: "manager-service"
    environment:
      KAFKA_URL: crackhash_kafka:9092
      WORKER_URL_1: http://crackhash-worker-service-1:8086
      WORKER_URL_2: http://crackhash-worker-service-2:8086
      WORKER_URL_3: http://crackhash-worker-service-3:8086
      MONGO_DB_URI: mongodb://mongo_user:mongo_password@mongo-1:27017,mongo-2:27017,mongo-3:27017/crackhash_db_mongo?authSource=admin&replicaSet=rs0
      SEND_TYPE: kafka
      WORKER_NUMBER: 3
    ports:
      - "8085:8085"
    networks:
      - crackhash-net

networks:
  crackhash-net:
    name: "crackhash-net"
    driver: bridge
    external: true