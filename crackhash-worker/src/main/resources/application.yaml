server:
  port: 8086

spring:
  application:
    name: crackhash-worker

  cloud:
    openfeign:
      client:
        config:
          managerFeignClient:
            url: ${MANAGER_URL:http://localhost:8085}

send-type: ${SEND_TYPE:kafka}

crack-hash:
  cracking-hash-thread-pool-size: ${CRACKING_HASH_THREAD_POOL_SIZE:10}

  kafka:
    producer:
      config:
        bootstrap-servers: localhost:9092
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.apache.kafka.common.serialization.StringSerializer
        retries: 0
        acks: all
      topic: crackhash_task_result_topic

    consumer:
      config:
        bootstrap-servers: localhost:9092
        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
        group-id: crackhash_task_request_group_id
        auto-offset-reset: earliest
        enable-auto-commit: false
      properties:
        concurrency: ${WORKER_NUMBER:2}
      topic: crackhash_task_request_topic