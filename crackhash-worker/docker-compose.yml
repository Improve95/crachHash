services:
  crackhash-worker-service-1:
    build:
      dockerfile: Dockerfile
    container_name: "worker-service-1"
    env_file:
      - .env
    ports:
      - "8086:8086"
    networks:
      - crackhash-net
  crackhash-worker-service-2:
    build:
      dockerfile: Dockerfile
    container_name: "worker-service-2"
    env_file:
      - .env
    ports:
      - "8087:8086"
    networks:
      - crackhash-net
  crackhash-worker-service-3:
    build:
      dockerfile: Dockerfile
    container_name: "worker-service-3"
    env_file:
      - .env
    ports:
      - "8088:8086"
    networks:
      - crackhash-net

networks:
  crackhash-net:
    name: "crackhash-net"
    driver: bridge
    external: true