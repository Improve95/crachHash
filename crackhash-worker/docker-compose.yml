x-worker-base: &worker-base
  build:
    dockerfile: Dockerfile
  env_file:
    - .env
  networks:
    - crackhash-net

services:
  crackhash-worker-service-1:
    <<: *worker-base
    container_name: "worker-service-1"
    ports:
      - "8086:8086"
  crackhash-worker-service-2:
    <<: *worker-base
    container_name: "worker-service-2"
    ports:
      - "8087:8086"
  crackhash-worker-service-3:
    <<: *worker-base
    container_name: "worker-service-3"
    ports:
      - "8088:8086"

networks:
  crackhash-net:
    name: "crackhash-net"
    driver: bridge
    external: true